<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Financeiro</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <div class="top-header">
            <h1>Painel de Controle Financeiro</h1>
            <button id="theme-toggle" class="btn-theme" onclick="toggleTheme()" title="Mudar Tema">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div class="resumo-grid">
            <div class="card">
                <h3>Receitas</h3>
                <div class="valor receita" id="total-receita">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>Despesas</h3>
                <div class="valor despesa" id="total-despesa">R$ 0,00</div>
            </div>
            <div class="card">
                <h3>Lucro Líquido</h3>
                <div class="valor" id="lucro-liquido">R$ 0,00</div>
            </div>
            <div class="card meta-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 id="nome-meta-display">Meta do Período</h3> <button onclick="definirMeta()" class="btn-meta-edit"><i class="fa-solid fa-pen-to-square"></i></button>
                    </div>
                <div class="valor" id="display-meta">R$ 0,00</div>
                <div class="container-barra">
                    <div id="barra-progresso" class="progresso-fill"></div>
                </div>
                <div id="texto-progresso" style="font-size: 12px; color: #636e72; margin-top: 5px;">0% atingido</div>
            </div>
        </div>

        <div class="meio-grid">
            <div class="form-container">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <h3 style="margin: 0;">Novo Lançamento</h3>
                    <button type="button" onclick="abrirModal()" style="background: transparent; color: #0984e3; border: none; cursor: pointer; text-decoration: underline; font-size: 13px;">+ Categorias</button>
                </div>
                <form id="form-transacao">
                    <input type="text" id="descricao" placeholder="Descrição (ex: Corrida, Venda)" required>
                    <input type="number" id="valor" placeholder="Valor (R$)" step="0.01" required>
                    <input type="date" id="data" required>
                    <select id="categoria" required></select>
                    <select id="tipo">
                        <option value="receita">Receita (Entrada)</option>
                        <option value="despesa">Despesa (Saída)</option>
                    </select>
                    <button type="submit">Adicionar</button>
                </form>
            </div>

           <div class="graficos-wrapper">
                <div class="grafico-box">
                    <canvas id="meuGrafico"></canvas>
                </div>
                <div class="grafico-box">
                    <canvas id="graficoBarras"></canvas>
                </div>
            </div>
        </div>

        <div class="tabela-container">
            <div class="tabela-header">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-bottom: 2px solid var(--fundo); padding-bottom: 10px; margin-bottom: 15px;">
                    <h3 style="margin: 0;">Histórico Recente</h3>
                    <button onclick="gerarPDF()" class="btn-pdf"><i class="fa-solid fa-file-pdf"></i> Exportar Relatório</button>
                </div>
                <div class="filtro-area">
                    <label><i class="fa-solid fa-filter"></i> Filtrar:</label>
                    <select id="filtro-tipo">
                        <option value="todos">Todos os Tipos</option>
                        <option value="receita">Apenas Receitas</option>
                        <option value="despesa">Apenas Despesas</option>
                    </select>
                    <select id="filtro-categoria"></select>
                    <input type="date" id="filtro-data-inicio" title="Data Inicial">
                    <input type="date" id="filtro-data-fim" title="Data Final">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Categoria</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </div>

    <div id="modal-categorias" class="modal-overlay">
        <div class="modal-box">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0;">Organizar Categorias</h3>
                <button onclick="fecharModal()" class="btn-fechar">&times;</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="nova-categoria" placeholder="Nova categoria..." onkeypress="if(event.key === 'Enter') adicionarCategoria()" style="flex: 1; padding: 8px; border: 1px solid #dfe6e9; border-radius: 5px;">
                <button onclick="adicionarCategoria()" style="background: #00b894; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Salvar</button>
            </div>

            <ul id="lista-categorias" style="list-style: none; padding: 0; margin: 0; max-height: 250px; overflow-y: auto;"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
